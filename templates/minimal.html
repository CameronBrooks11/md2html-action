<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>$if(title-prefix)$$title-prefix$ – $endif$$if(title)$$title$$else$$pagetitle$$endif$</title>

    $if(stylesheet)$ $if(rel_path)$
    <link rel="stylesheet" href="$rel_path$/$stylesheet$" />
    $else$
    <link rel="stylesheet" href="$stylesheet$" />
    $endif$ $endif$ $if(stylesheet-url)$
    <link rel="stylesheet" href="$stylesheet-url$" />
    $endif$ $if(math)$ $math$ $endif$ $if(highlighting-css)$
    <style>
      /* Unified dark code block so zenburn highlighting stays readable in light and dark mode (inline code keeps its theme style) */
      pre,
      .markdown-body pre,
      div.sourceCode {
        background-color: #1e222a;
      }
      pre,
      pre code,
      .markdown-body pre code {
        color: #dcdccc;
      }
$highlighting-css$
      @media print {
        body { background: #fff !important; color: #000 !important; }
        header { position: static; }
        pre, div.sourceCode { background: #f6f8fa !important; color: #111 !important; border: 1px solid #ddd; }
        pre code, pre code span { color: #111 !important; }
        a { color: #000; }
        * { box-shadow: none !important; }
      }
    </style>
    $endif$
  </head>

  <body>
    $if(title)$
    <header>
      <h1>$title$</h1>
    </header>
    $endif$ $if(toc)$
    <nav>
      <h2>Contents</h2>
      $table-of-contents$
    </nav>
    $endif$

    <main>$body$</main>
  </body>
</html>
