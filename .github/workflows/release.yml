# Create a GitHub Release when a version tag is pushed.
# Tests are expected to have already passed on main before tagging.

name: Release

on:
  push:
    # Match semver tags only (v1.2.3, v1.2.3-rc.1, etc.).
    # Excludes floating major tags like v1 or v2 to prevent duplicate releases
    # when a floating tag is force-updated alongside a versioned tag push.
    tags: ["v[0-9]*.[0-9]*.[0-9]*"]

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    name: Create GitHub Release
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: ${{ github.ref_name }}
          name: "md2html-action ${{ steps.version.outputs.VERSION }}"
          body: |
            ## md2html-action ${{ steps.version.outputs.VERSION }}

            A GitHub Action that converts Markdown files to HTML using Pandoc
            with customizable templates and stylesheets.

            ### Usage

            ```yaml
            - name: Convert Markdown to HTML
              uses: CameronBrooks11/md2html-action@${{ steps.version.outputs.VERSION }}
              with:
                source-dir: 'docs'
                output-dir: 'website'
                template: 'default'
                stylesheet: 'default'
            ```

            See the [README](README.md) for full documentation, input reference,
            template and stylesheet options, and deployment examples.

            ---

            **Full Changelog**: https://github.com/CameronBrooks11/md2html-action/commits/${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
